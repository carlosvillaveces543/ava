<body>

<script>

 ["dashboard","Dashboard","fa-chart-pie",1],["clientes","Clientes","fa-users",0],["facturacion","Facturación","fa-file-invoice-dollar",0],["ventas","Ventas","fa-cash-register",0],

const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
function norm(v){return String(v??"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ")}
function id(v){return norm(v).replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,120)||"item-"+Date.now()}
function n(v){if(typeof v==="number")return Number.isFinite(v)?v:0;let x=String(v??"").replace(/\./g,"").replace(",",".").replace(/[^0-9.-]/g,"");return Number.isFinite(parseFloat(x))?parseFloat(x):0}
function r2(v){return Math.round((n(v)+Number.EPSILON)*100)/100}
function money(v){return "$ "+r2(v).toLocaleString("es-CO",{minimumFractionDigits:2,maximumFractionDigits:2})}

function doc(d){let x=d.data()||{};return{id:d.id,...x,fechaDate:ddoc(x)}}function inR(x,r){let d=x.fechaDate||ddoc(x);return d>=r.start&&d<=r.end}
function sum(a,fn){return a.reduce((t,x)=>t+n(fn(x)),0)}function maxNum(arr,k){return arr.reduce((m,x)=>Math.max(m,parseInt(x[k]||0)||0),0)+1}

/* ================== AUTH ================== */
$("#loginForm").onsubmit=async e=>{e.preventDefault();let em=$("#email"),pa=$("#pass");if(!(req(em,"Ingresa tu correo")&req(pa,"Ingresa tu contraseña")))return;load();try{await auth.signInWithEmailAndPassword(em.value.trim(),pa.value)}catch(err){toast("No se pudo iniciar sesión: "+err.message,"err")}finally{load(false)}};
auth.onAuthStateChanged(async u=>{load();try{if(!u){st.uid=null;st.profile=null;st.unsubs.forEach(x=>x());st.unsubs=[];$("#auth").classList.remove("hidden");$("#app").classList.add("hidden");return}st.uid=u.uid;let s=await db.collection("usuarios").doc(u.uid).get();if(!s.exists)throw Error("No existe documento en usuarios para este UID.");st.profile={id:s.id,...s.data()};st.meta=n(st.profile.metaMes);$("#auth").classList.add("hidden");$("#app").classList.remove("hidden");let name=st.profile.nombre||st.profile.name||u.displayName||u.email;$("#user").innerHTML=`<div class="avatar">${esc(name[0].toUpperCase())}</div><div><strong>${esc(name)}</strong><small>${esc(st.profile.rol||"sin rol")}</small></div>`;st.module=st.profile.rol==="admin"?"dashboard":"facturacion";nav();subs();render(st.module)}catch(err){toast("Error cargando perfil: "+err.message,"err");await auth.signOut()}finally{load(false)}});
$("#logout").onclick=()=>auth.signOut();
function allowed(m){return st.profile?.rol==="admin"||worker.includes(m)}function amods(){return st.profile?.rol==="admin"?mods:mods.filter(x=>worker.includes(x[0]))}
function nav(){let out=amods().map(m=>`<button class="${st.module===m[0]?"active":""}" data-m="${m[0]}"><i class="fa-solid ${m[2]}"></i>${m[1]}</button>`).join("");$("#nav").innerHTML=out;$$("#nav button").forEach(b=>b.onclick=()=>{go(b.dataset.m);document.body.classList.remove("open-side")})}
function go(m){if(!allowed(m))return toast("No tienes permisos para este módulo.","warn");st.module=m;nav();render(m)}
function subs(){st.unsubs.forEach(x=>x());st.unsubs=[];["compras","gastos","productos","precios","ventas","clientes","inventario"].forEach(c=>{st.unsubs.push(db.collection(c).onSnapshot(s=>{cache[c]=s.docs.map(doc);if(["dashboard","inventario","productoDetallado","productoMargen","historialCompras","historialGastos","ventas","clientes"].includes(st.module))render(st.module)},e=>toast("Error sincronizando "+c+": "+e.message,"err")))})}
function render(m){let meta=mods.find(x=>x[0]===m);$("#title").textContent=meta?meta[1]:"AVA";Object.values(st.charts).forEach(c=>{try{c.destroy()}catch(e){}});st.charts={};$("#view").innerHTML=views[m]?views[m]():"";binds[m]?.();sortTables();nowFields()}
function nowFields(){$$(".now").forEach(x=>x.value=fdt(new Date()))}setInterval(nowFields,1000);
function sortTables(){$$("th.sort").forEach((th,i)=>th.onclick=()=>{let tb=th.closest("table").tBodies[0],rows=[...tb.rows],asc=!th.classList.contains("asc");$$("th",th.closest("table")).forEach(h=>h.classList.remove("asc","desc"));th.classList.add(asc?"asc":"desc");rows.sort((a,b)=>{let A=a.cells[i].dataset.sort||a.cells[i].textContent,B=b.cells[i].dataset.sort||b.cells[i].textContent,an=parseFloat(A),bn=parseFloat(B),r=Number.isFinite(an)&&Number.isFinite(bn)?an-bn:String(A).localeCompare(String(B));return asc?r:-r});rows.forEach(r=>tb.appendChild(r))})}
function ac(inp,items,select){let menu=document.createElement("div");menu.className="ac";inp.closest(".field").appendChild(menu);function draw(){let q=norm(inp.value),arr=q?items(q).slice(0,12):[];menu.innerHTML=arr.map((x,i)=>`<div data-i="${i}"><span>${esc(x.label||x.descripcion||x.nombre)}</span><small>${esc(x.sub||"")}</small></div>`).join("");menu.classList.toggle("open",arr.length>0);$$("div",menu).forEach(d=>d.onmousedown=e=>{e.preventDefault();let x=arr[d.dataset.i];inp.value=x.label||x.descripcion||x.nombre;select(x);menu.classList.remove("open")})}inp.addEventListener("input",draw);inp.addEventListener("focus",draw);document.addEventListener("mousedown",e=>{if(!inp.closest(".field").contains(e.target))menu.classList.remove("open")})}
function lastCompra(desc,fn=()=>1){let k=norm(desc);return cache.compras.filter(c=>norm(c.descripcion)===k&&fn(c)).sort((a,b)=>b.fechaDate-a.fechaDate)[0]}
function uniques(fn=()=>1){let m=new Map();cache.compras.filter(fn).sort((a,b)=>b.fechaDate-a.fechaDate).forEach(c=>{let k=norm(c.descripcion);if(c.descripcion&&!m.has(k))m.set(k,{...c,label:c.descripcion,sub:`${c.tipoProducto||""} · ${money(c.valorUnitario)}/${c.unidad||""}`})});return [...m.values()].sort((a,b)=>a.label.localeCompare(b.label))}
function unitCost(desc){return n(lastCompra(desc)?.valorUnitario)}
function pCost(p){return (p?.insumos||[]).reduce((t,i)=>t+n(i.cantidad)*(unitCost(i.descripcion)||n(i.costoUnitario)),0)}
async function syncProductCosts(desc,cost){let k=norm(desc),ups=[];cache.productos.forEach(p=>{let ch=false,ins=(p.insumos||[]).map(i=>{if(norm(i.descripcion)!==k)return i;ch=true;return{...i,costoUnitario:r2(cost),costoTotal:r2(n(i.cantidad)*cost)}});if(ch)ups.push(db.collection("productos").doc(p.id).update({insumos:ins,updatedAt:TS.fromDate(new Date())}))});await Promise.all(ups)}
const table=(heads,rows)=>rows.length?`<div class="table"><table><thead><tr>${heads.map(h=>`<th class="${h.sort?"sort":""}">${h.t}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table></div>`:`<div class="empty"><i class="fa-solid fa-inbox"></i><br>Sin registros para mostrar.</div>`;
function row(cells){return`<tr>${cells.map(c=>`<td data-sort="${c.s??""}" class="${c.cl||""}">${c.v??c}</td>`).join("")}</tr>`}
function kpi(t,v,i){return`<div class="kpi"><i class="fa-solid ${i}"></i><small>${t}</small><strong>${v}</strong></div>`}

function byDay(arr,fn,r){let m=new Map(days(r).map(d=>[ymd(d),0]));arr.forEach(x=>{let k=ymd(x.fechaDate);if(m.has(k))m.set(k,m.get(k)+n(fn(x)))});return m}
function chartOpts(){let cs=getComputedStyle(document.body);return{responsive:true,plugins:{legend:{labels:{color:cs.getPropertyValue("--text")}},tooltip:{callbacks:{label:c=>`${c.dataset.label||c.label}: ${money(c.parsed.y??c.parsed)}`}}},scales:{x:{ticks:{color:cs.getPropertyValue("--muted")},grid:{color:cs.getPropertyValue("--line")}},y:{ticks:{color:cs.getPropertyValue("--muted"),callback:v=>money(v)},grid:{color:cs.getPropertyValue("--line")}}}}}
function drawDash(){if(st.module!=="dashboard")return;let r=st.filters.dashboard,v=cache.ventas.filter(x=>inR(x,r)),c=cache.compras.filter(x=>inR(x,r)),g=cache.gastos.filter(x=>inR(x,r)),labs=days(r).map(ymd),vm=byDay(v,x=>x.total,r),cm=byDay(c,x=>x.valorTotal,r),gm=byDay(g,x=>x.valor,r);if($("#barChart"))st.charts.b=new Chart($("#barChart"),{type:"bar",data:{labels:labs,datasets:[{label:"Ventas",data:labs.map(l=>vm.get(l)||0)},{label:"Compras",data:labs.map(l=>cm.get(l)||0)},{label:"Gastos",data:labs.map(l=>gm.get(l)||0)}]},options:chartOpts()});let pay={Efectivo:0,Nequi:0,Transferencia:0,Tarjeta:0};v.forEach(x=>(x.pagos||[{forma:x.formaPago,monto:x.total}]).forEach(p=>{if(pay[p.forma]!=null)pay[p.forma]+=n(p.monto)}));if($("#payChart"))st.charts.p=new Chart($("#payChart"),{type:"doughnut",data:{labels:Object.keys(pay),datasets:[{data:Object.values(pay)}]},options:{responsive:true,plugins:{legend:{position:"bottom"}}}});let start=r.start,year=start.getFullYear(),month=start.getMonth(),td=new Date(year,month+1,0).getDate(),now=new Date(),elapsed=(now.getFullYear()===year&&now.getMonth()===month)?now.getDate():(start<now?td:Math.max(1,r.end.getDate())),avg=sum(v,x=>x.total)/elapsed,meta=n(st.meta),dl=[...Array(td)].map((_,i)=>String(i+1));if($("#projChart"))st.charts.pr=new Chart($("#projChart"),{type:"line",data:{labels:dl,datasets:[{label:"Proyección",data:dl.map((_,i)=>r2(avg*(i+1))),tension:.28},{label:"Meta",data:dl.map(()=>meta),tension:0}]},options:chartOpts()})}
function topSold(v){let m=new Map();v.forEach(x=>(x.items||[]).forEach(i=>m.set(i.nombre,(m.get(i.nombre)||0)+n(i.cantidad))));let rows=[...m].map(([nombre,cant])=>({nombre,cant})).sort((a,b)=>b.cant-a.cant).slice(0,5);return table([{t:"Producto",sort:1},{t:"Unidades",sort:1}],rows.map(x=>row([{v:esc(x.nombre)},{v:r2(x.cant),s:x.cant}])))}
function topMargin(v){let m=new Map();v.forEach(x=>(x.items||[]).forEach(i=>{let p=cache.productos.find(p=>p.id===i.productId)||cache.productos.find(p=>norm(p.nombre)===norm(i.nombre)),cost=n(i.costoUnitario)||pCost(p),mg=(n(i.pvp)-cost)*n(i.cantidad);m.set(i.nombre,(m.get(i.nombre)||0)+mg)}));let rows=[...m].map(([nombre,mg])=>({nombre,mg})).sort((a,b)=>b.mg-a.mg).slice(0,5);return table([{t:"Producto",sort:1},{t:"Margen $",sort:1}],rows.map(x=>row([{v:esc(x.nombre)},{v:money(x.mg),s:x.mg}])))}
function salesClient(v){let m=new Map();v.forEach(x=>m.set(x.cliente||"General",(m.get(x.cliente||"General")||0)+n(x.total)));let rows=[...m].map(([cliente,total])=>({cliente,total})).sort((a,b)=>b.total-a.total);return table([{t:"Cliente",sort:1},{t:"Total en ventas",sort:1}],rows.map(x=>row([{v:esc(x.cliente)},{v:money(x.total),s:x.total}])))}
</script>
